spring.application.name=paper
spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/paper-microservice-project-backend/.env[.properties]
server.port=${PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.try-it-out-enabled=true

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:true}

# Valores en .env (raíz del proyecto); ver .env.example
backblaze.endpoint=${BACKBLAZE_ENDPOINT}
backblaze.region=${BACKBLAZE_REGION}
backblaze.bucket-name=${BACKBLAZE_BUCKET_NAME}
backblaze.access-key=${BACKBLAZE_ACCESS_KEY}
backblaze.secret-key=${BACKBLAZE_SECRET_KEY}